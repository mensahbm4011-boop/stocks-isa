<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Stock Portfolio Demo</title>
  <style>
    :root {
      --bg: #010203;
      --card: #080b10;
      --line: #151b22;
      --text: #f5f7fb;
      --muted: #8b96a6;
      --blue: #2aa8ff;
      --green: #6dff8c;
      --red: #ff5d6c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #07131c 0%, #020406 38%, var(--bg) 75%);
      color: var(--text);
    }

    .app {
      --page-pad: 18px;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px var(--page-pad) 90px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: .5px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), #005aff);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      letter-spacing:.3px;
      flex-shrink:0;
    }

    .icons { color: var(--muted); font-size: 22px; }

    .label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .9px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .value {
      font-size: 56px;
      line-height: 1;
      margin: 10px 0 20px;
      font-weight: 500;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 16px;
    }

    .stat-value {
      color: var(--green);
      font-size: 22px;
      margin-top: 4px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      background: linear-gradient(180deg, #0d1118, #090c11);
      color: #dfe7ef;
      padding: 11px 14px;
      border-radius: 14px;
      font-weight: 800;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      font-family: "Arial Narrow", Inter, sans-serif;
      font-size: 12px;
      margin-bottom: 20px;
      border: 1px solid #181f28;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #95a0ad;
      border-radius: 50%;
    }

        .chart-card {
      position: relative;
      background: linear-gradient(180deg, rgba(8,25,36,.96), rgba(3,6,9,.98));
      border: 1px solid rgba(42,168,255,.14);
      border-radius: 22px;
      padding: 16px 10px 10px;
      margin-bottom: 18px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    .chart-meta {
      position: absolute;
      top: 14px;
      left: 18px;
      z-index: 3;
      background: rgba(5,8,13,.68);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 8px 10px;
      pointer-events: none;
    }

    .chart-date {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .chart-mini-value {
      margin-top: 2px;
      font-size: 15px;
      font-weight: 800;
    }

    svg { width: 100%; height: 225px; display: block; }

    .tabs {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
      padding: 0 10px;
    }

    .tabs span {
      padding: 10px 12px;
      border-radius: 18px;
    }

    .tabs .active {
      color: white;
      background: #1b2029;
    }

    .panel {
      background: linear-gradient(180deg, rgba(10,13,18,.98), rgba(5,7,10,.98));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      margin-top: 14px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input, select {
      width: 100%;
      border: 1px solid #273442;
      background: #090f16;
      color: white;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      outline: none;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 10px;
      border-radius: 16px;
      border: 1px solid #202c38;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 100%;
      font-size: 12px;
      background: #0a1017;
    }

    thead th {
      background: #111820;
    }

    th, td {
      padding: 11px 6px;
      border-bottom: 1px solid #22303c;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align:center; width:28px; } th:nth-child(2), td:nth-child(2){text-align:left;}

    th {
      color: var(--muted);
      font-size: 12px;
    }

    tbody tr.active-row {
      background: linear-gradient(90deg, rgba(42,168,255,.22), rgba(42,168,255,.05));
      outline: 1px solid rgba(42,168,255,.55);
      outline-offset: -1px;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: rgba(9,15,22,.96);
      border-top: 1px solid #1f2d39;
      display: flex;
      justify-content: space-around;
      padding: 13px 0 20px;
      color: var(--muted);
      font-size: 24px;
    }

    .bottom-nav .active { color: var(--blue); }

    @media (max-width: 360px) {
      .value { font-size: 46px; }
      .hero-tag { font-size: 23px; }
    }

    @media (max-width: 430px) {
      .app { --page-pad: 14px; padding-left: var(--page-pad); padding-right: var(--page-pad); }
      .value { font-size: 48px; }
      .chart-card { padding-left: 6px; padding-right: 6px; }
      th, td { padding: 10px 5px; font-size: 11px; }
      th:nth-child(4), td:nth-child(4) { display: none; }
      .table-wrap { overflow-x: hidden; }
      .panel { padding: 13px; }
      .brand { gap: 6px; }
      .logo { width: 28px; height: 28px; }
    }

  
    .portfolio-head{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
    .portfolio-actions{display:flex!important;gap:8px;width:100%;visibility:visible!important;opacity:1!important}
    .action-btn{display:inline-flex;align-items:center;justify-content:center;flex:1;min-height:42px;border-radius:13px;border:1px solid #1f2a34;background:linear-gradient(180deg,#111820,#0a0f15);color:#f7fbff;font-weight:800;font-size:12px;letter-spacing:.3px;cursor:pointer}
    .action-btn.primary{background:linear-gradient(180deg,#269ef3,#147bd0);border-color:#36a9f6;box-shadow:0 10px 24px rgba(42,168,255,.18)}
    .action-btn:active{transform:scale(.98)}
    .account-subtitle{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.1px;margin-bottom:2px}
    .brand-account{display:flex;flex-direction:column;min-width:0}
    .portfolio-card-list{display:none}
    .portfolio-card{border:1px solid #171f28;border-radius:14px;background:linear-gradient(180deg,#090d12,#06090d);padding:12px;margin-bottom:9px}
    .portfolio-card.active-row{border-color:rgba(42,168,255,.5);box-shadow:0 0 0 1px rgba(42,168,255,.12)}
    .portfolio-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .portfolio-card-date{font-weight:800;font-size:13px}
    .portfolio-card-value{font-size:19px;font-weight:800}
    .portfolio-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .portfolio-card-grid .k{display:block;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px}
    .portfolio-card-grid .v{display:block;font-size:12px;font-weight:800}
    .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:#0c1218;color:#fff;border:1px solid #1e2a35;padding:11px 14px;border-radius:12px;font-size:12px;font-weight:700;transition:.2s ease;z-index:20}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:430px){.portfolio-card-list{display:block}.table-wrap{display:none}.value{letter-spacing:-1.5px}.action-btn{font-size:11px}}


    .cash-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin: 0 0 14px;
      padding: 14px 14px 14px 16px;
      border-radius: 20px;
      background: linear-gradient(145deg, #0c2636, #081b28);
      border: 1px solid rgba(62, 151, 205, .08);
      box-shadow:
        0 12px 30px rgba(0, 0, 0, .28),
        inset 0 1px 0 rgba(255, 255, 255, .025);
    }

    .cash-details {
      min-width: 0;
    }

    .cash-label {
      margin-bottom: 3px;
      color: #91a0ae;
      font-size: 10px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .cash-value {
      color: #f3f7fb;
      font-size: 15px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .cash-deposit-btn {
      min-width: 82px;
      min-height: 38px;
      padding: 0 17px;
      border: 1px solid rgba(75, 205, 255, .35);
      border-radius: 999px;
      background: linear-gradient(180deg, #19b6ee, #079ad5);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .1px;
      cursor: pointer;
      box-shadow:
        0 8px 18px rgba(0, 166, 224, .22),
        inset 0 1px 0 rgba(255, 255, 255, .22);
      transition: transform .15s ease, filter .15s ease;
    }

    .cash-deposit-btn:active {
      transform: scale(.97);
      filter: brightness(.94);
    }

    @media (max-width: 430px) {
      .cash-card {
        margin-bottom: 12px;
        padding: 13px 13px 13px 15px;
      }

      .cash-deposit-btn {
        min-width: 80px;
        min-height: 38px;
      }
    }


    body {
      font-family: "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 400;
      letter-spacing: -.01em;
    }

    .brand,
    .panel-title,
    .portfolio-card-date,
    .portfolio-card-value,
    .cash-value {
      font-family: "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      letter-spacing: -.015em;
    }

    .label,
    .account-subtitle,
    .cash-label,
    .portfolio-card-grid .k,
    th {
      font-family: "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      letter-spacing: .055em;
    }

    .value {
      font-family: "Helvetica Neue", "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 300;
      letter-spacing: -.045em;
    }

    .stat-value,
    .chart-mini-value {
      font-family: "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 500;
      letter-spacing: -.02em;
    }

    .pill,
    .cash-deposit-btn,
    .action-btn,
    input,
    select,
    td {
      font-family: "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .pill {
      font-weight: 600;
      letter-spacing: .075em;
    }

    .cash-deposit-btn {
      font-weight: 500;
      letter-spacing: 0;
    }

    .tabs {
      font-family: "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      letter-spacing: -.01em;
    }


    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, .06);
      border-radius: 50%;
      background: rgba(7, 10, 14, .82);
      color: #edf3f8;
      font: inherit;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .icon-btn:active {
      transform: scale(.95);
      background: #101720;
      border-color: rgba(42, 168, 255, .25);
    }

    .bell-btn {
      position: relative;
      font-size: 0;
    }

    .bell-btn::before {
      content: "";
      width: 13px;
      height: 15px;
      border: 1.8px solid currentColor;
      border-bottom: 0;
      border-radius: 9px 9px 3px 3px;
      transform: translateY(-1px);
    }

    .bell-btn::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 5px;
      border-bottom: 1.8px solid currentColor;
      border-radius: 0 0 9px 9px;
      bottom: 8px;
    }

    .account-value-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 4px;
    }

    .account-value-copy {
      min-width: 0;
      flex: 1;
    }

    .account-plus-btn {
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid rgba(78, 206, 255, .34);
      border-radius: 50%;
      background: linear-gradient(180deg, #18b7ef, #0798d4);
      color: #fff;
      font-family: "Helvetica Neue", "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 48px;
      font-weight: 200;
      line-height: 1;
      cursor: pointer;
      box-shadow:
        0 14px 30px rgba(0, 170, 230, .22),
        inset 0 1px 0 rgba(255, 255, 255, .2);
      transition: transform .15s ease, filter .15s ease;
    }

    .account-plus-btn:active {
      transform: scale(.96);
      filter: brightness(.94);
    }

    @media (max-width: 430px) {
      .account-value-row {
        gap: 14px;
      }

      .account-plus-btn {
        width: 56px;
        height: 56px;
        flex-basis: 56px;
        font-size: 40px;
      }

      .top-actions {
        gap: 6px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
      }
    }


    .account-plus-btn {
      position: relative;
      font-size: 0;
    }

    .account-plus-btn::before,
    .account-plus-btn::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: #ffffff;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .account-plus-btn::before {
      width: 29px;
      height: 2px;
    }

    .account-plus-btn::after {
      width: 2px;
      height: 29px;
    }

    .bell-btn {
      background: transparent;
      border-color: transparent;
      width: 36px;
      height: 36px;
    }

    .bell-btn::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 7px;
      width: 13px;
      height: 16px;
      transform: translateX(-50%);
      border: 1.8px solid #aeb8c2;
      border-bottom: none;
      border-radius: 9px 9px 4px 4px;
      box-sizing: border-box;
    }

    .bell-btn::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 22px;
      width: 19px;
      height: 8px;
      transform: translateX(-50%);
      border-top: 1.8px solid #aeb8c2;
      border-radius: 50%;
      box-shadow: 0 3px 0 -1px #aeb8c2;
    }

    .bell-btn:hover,
    .bell-btn:focus-visible {
      background: rgba(255, 255, 255, .035);
      border-color: rgba(255, 255, 255, .06);
    }




    .account-plus-btn::before {
      width: 18px;
      height: 2px;
    }

    .account-plus-btn::after {
      width: 2px;
      height: 18px;
    }


    .account-value-formatted {
      display: flex;
      align-items: baseline;
      white-space: nowrap;
    }

    .currency-symbol {
      margin-right: 3px;
      font-size: .48em;
      font-weight: 400;
      letter-spacing: -.02em;
    }

    .value-major {
      font-size: 1em;
      font-weight: 300;

    }

    .value-minor {
      margin-left: 3px;
      font-size: .56em;

      letter-spacing: -.01em;
    }


    .account-value-row {
      align-items: center;
    }

    .account-plus-btn {
      transform: none;
    }

    .account-plus-btn:active {
      transform: scale(.96);
    }


    .chart-card {
      padding-right: 6px;
    }

      position: absolute;

      display: flex;
      flex-direction: column;

    .chart-axis-right span {

    #gridGroup line {

      }

    .full-bleed-section {
      width: calc(100% + (var(--page-pad) * 2));
      margin-left: calc(var(--page-pad) * -1);
      margin-right: calc(var(--page-pad) * -1);
      border-radius: 0 !important;
    }

    .chart-card.full-bleed-section,
    .cash-card.full-bleed-section,
    .portfolio-panel.full-bleed-section {
      border-left: 0;
      border-right: 0;
    }

      padding-left: 14px;

    }

    .cash-card.full-bleed-section {
      padding-left: 18px;

    }

    .portfolio-panel.full-bleed-section {

    }

        padding-left: 12px;

      }

      .cash-card.full-bleed-section,
      .portfolio-panel.full-bleed-section {
        padding-left: 14px;
        padding-right: 14px;
      }
    }


    .bell-btn {
      width: 38px;
      height: 38px;
      padding: 5px;
      background: transparent;
      border-color: transparent;
      overflow: visible;
    }

    .bell-btn::before,
    .bell-btn::after {
      display: none !important;
      content: none !important;
    }

    .notification-bell-icon {
      width: 28px;
      height: 28px;
      display: block;
      overflow: visible;
    }

    .notification-bell-icon .bell-body,
    .notification-bell-icon .bell-clapper {
      fill: #aeb8c2;
    }

    .notification-bell-icon .bell-ring {
      fill: none;
      stroke: #aeb8c2;
      stroke-width: 5.5;
      stroke-linecap: square;
    }

    .bell-btn:active .notification-bell-icon {
      transform: scale(.94);
    }

    @media (max-width: 430px) {
      .bell-btn {
        width: 36px;
        height: 36px;
      }

      .notification-bell-icon {
        width: 26px;
        height: 26px;
      }
    }


    .bell-btn {
      width: 34px;
      height: 34px;
      padding: 7px;
      background: transparent;
      border-color: transparent;
    }

    .bell-btn::before,
    .bell-btn::after {
      display: none !important;
      content: none !important;
    }

    .simple-bell-icon {
      width: 19px;
      height: 19px;
      display: block;
      fill: none;
      stroke: #aeb8c2;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bell-btn:active .simple-bell-icon {
      transform: scale(.94);
    }


    .volatility-control {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    .volatility-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .volatility-head label {
      margin: 0;
    }

    #volatilityValue {
      color: #eaf3fb;
      font-size: 12px;
      font-weight: 700;
    }

    #volatilityInput {
      width: 100%;
      padding: 0;
      accent-color: var(--blue);
      cursor: pointer;
    }

    .volatility-scale {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      color: var(--muted);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

</style>
</head>
<body>
  <main class="app">
    <section class="topbar">
      <div class="brand"><div class="logo">BM</div><div class="brand-account"><div class="account-subtitle">Investment account</div>
<select id="accountSelect" style="background:transparent;border:none;color:white;font-weight:800;font-size:13px;outline:none;cursor:pointer;max-width:190px;">
  <option selected>Account: 20876414</option>
  <option>Account: 14590382</option>
  <option>Account: 78241659</option>
  <option>Account: 39187520</option>
</select></div>
</div>
      <div class="top-actions">
        <button type="button" class="icon-btn bell-btn" id="notificationBtn" aria-label="Notifications">
          <svg class="simple-bell-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/>

          </svg>

        <button type="button" class="icon-btn" id="settingsBtn" aria-label="Settings">⚙︎</button>

    <section>
      <div class="account-value-row">
        <div class="account-value-copy">
          <div class="label">Account Value</div>
          <div class="value account-value-formatted" id="accountValue"><span class="currency-symbol">€</span><span class="value-major">3</span><span class="value-minor">,215.94</span></div>

      </div>

      <div class="stats">
        <div>
          <div class="label">Total Profit</div>
          <div class="stat-value" id="profit">↗ €315,94</div>

        <div>
          <div class="label">Rate of Return</div>

        </div>

      <div class="pill"><span class="dot"></span><span id="netDeposits">€2.900,00 Net deposits</span></div>
    </section>

        <section class="chart-card full-bleed-section" id="chartCard">
      <div class="chart-meta">
        <div class="chart-date" id="chartDate">Vandaag</div>
        <div class="chart-mini-value" id="chartMiniValue">€0</div>
      </div>

      <svg id="chartSvg" viewBox="0 0 360 190" preserveAspectRatio="none">
        <defs>
          <linearGradient id="fill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#2aa8ff" stop-opacity=".30"/>
            <stop offset="100%" stop-color="#2aa8ff" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <g id="gridGroup"></g>

      <div class="chart-axis-right" aria-hidden="true">
        <span>3K</span>

    <section class="cash-card full-bleed-section" aria-label="Cash balance">

    </section>

    <section class="panel full-bleed-section portfolio-panel">
      <div class="panel-title">Portfolio</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th><th>Date</th>
              <th>Deposits</th>
              <th>Value</th>
              <th>Month %</th>
              <th>Profit</th>
              <th>ROI</th>
            </tr>
          </thead>
          <tbody id="portfolioTable"></tbody>

      <div class="portfolio-card-list" id="portfolioCards"></div>
    </section>
     <section class="panel">
      <div class="panel-title">Simulation</div>
      <div class="input-grid">
        <div>
          <label>Initial investment</label>
          <input id="startAmount" type="number" value="2900" min="0">
        </div>
        <div>
          <label>Annual return %</label>
          <input id="annualReturn" type="number" value="23.6" step="0.1">
        </div>
        <div>
          <label>Monthly deposit</label>
          <input id="monthlyDeposit" type="number" value="100" min="0">
        </div>
        <div>
          <label>Period</label>
          <select id="years">
            <option>1</option><option>2</option><option>3</option><option>5</option><option selected>7</option><option>10</option>
          </select>
        </div>

        <div class="volatility-control">
          <div class="volatility-head">
            <label for="volatilityInput">Market fluctuation</label>
            <span id="volatilityValue">100%</span>
          </div>
          <input id="volatilityInput" type="range" min="0" max="300" value="100" step="5">
          <div class="volatility-scale">
            <span>Low</span>
            <span>High</span>
          </div>
        </div>
      </div>

 </main>
  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <span class="active">⌂</span><span>◔</span><span>▣</span><span>☰</span>
  </nav>

  <script>
    const startAmount = document.getElementById('startAmount');
    const annualReturn = document.getElementById('annualReturn');
    const monthlyDeposit = document.getElementById('monthlyDeposit');
    const years = document.getElementById('years');
    const volatilityInput = document.getElementById('volatilityInput');
    const volatilityValue = document.getElementById('volatilityValue');
    const tbody = document.getElementById('portfolioTable');
    const chartCard = document.getElementById('chartCard');
    const chartSvg = document.getElementById('chartSvg');

    let rows = [];
    let chartPoints = [];
    let selectedIndex = 83;

    const euro = value => new Intl.NumberFormat('nl-NL', {
      style: 'currency', currency: 'EUR'
    }).format(value);

    const dateLabel = date => {
      const dd = String(date.getDate()).padStart(2, '0');
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const yy = String(date.getFullYear()).slice(-2);
      return `${dd}/${mm}/${yy}`;
    };


    function formatFeaturedAccountValue(value) {
      const formatted = new Intl.NumberFormat('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(value);

      const comma = formatted.indexOf(',');
      const dot = formatted.indexOf('.');
      const splitAt = comma >= 0 ? comma : dot;

      const major = splitAt >= 0 ? formatted.slice(0, splitAt) : formatted;
      const minor = splitAt >= 0 ? formatted.slice(splitAt) : '';

      return `
        <span class="currency-symbol">€</span>
        <span class="value-major">${major}</span>
        <span class="value-minor">${minor}</span>
      `;
    }

    function calculateSeries() {
      const start = Number(startAmount.value || 0);
      const yearly = Number(annualReturn.value || 0) / 100;
      const deposit = Number(monthlyDeposit.value || 0);
      let totalMonths = Number(years.value) * 12;
      if (Number(years.value) === 7) totalMonths = 91;
      const baseMonthlyRate = Math.pow(1 + yearly, 1 / 12) - 1;
      const startDate = new Date(2019, 0, 1);

      let value = start;
      let invested = start;
      const result = [];

      // Meer schommelingen, maar geen negatieve maandrendementen.
      // De maandelijkse return blijft minimaal positief, zodat de portfolio niet per maand in de min gaat.
      function marketNoise(month) {
        const wave1 = Math.sin(month * 0.85) * 0.012;
        const wave2 = Math.sin(month * 1.95 + 1.6) * 0.008;
        const wave3 = Math.sin(month * 0.31 + 2.2) * 0.006;
        const pseudoRandom = Math.sin(month * 12.9898) * 43758.5453;
        const noise = (pseudoRandom - Math.floor(pseudoRandom) - 0.5) * 0.014;

        // Korte zachtere terugvallen, maar niet genoeg om maandresultaat negatief te maken.
        const dips = {
          7: -0.018,
          14: -0.024,
          23: -0.020,
          31: -0.026,
          44: -0.022,
          53: -0.028,
          67: -0.020,
          78: -0.026,
          88: -0.018
        };

        const fluctuationMultiplier = Number(volatilityInput.value || 100) / 100;
        return (wave1 + wave2 + wave3 + noise + (dips[month] || 0)) * fluctuationMultiplier;
      }

      for (let m = 1; m <= totalMonths; m++) {
        if (m > 1) {
          value += deposit;
          invested += deposit;
        }

        const monthlyReturn = Math.max(0.0025, baseMonthlyRate + marketNoise(m));
        value *= (1 + monthlyReturn);

        const d = new Date(startDate);
        d.setMonth(startDate.getMonth() + m - 1);
        const daySeed = Math.sin(m * 9.731) * 10000;
        const randomDay = Math.floor((daySeed - Math.floor(daySeed)) * 26) + 1;
        d.setDate(randomDay);

        const profit = value - invested;

        result.push({
          month: m,
          date: d,
          invested,
          value,
          monthlyReturn,
          profit,
          roi: invested > 0 ? profit / invested * 100 : 0
        });
      }

      return result;
    }

    function drawChart() {
      const plot = {
        left: 4,
        right: 348,
        top: 20,
        bottom: 176
      };

      const values = rows.map(r => r.value);
      const min = Math.min(...values) * .98;
      const max = Math.max(...values) * 1.02;

      chartPoints = rows.map((r, i) => {
        const x = rows.length === 1
          ? plot.left
          : plot.left + (i / (rows.length - 1)) * (plot.right - plot.left);
        const y = plot.bottom - ((r.value - min) / (max - min || 1)) * (plot.bottom - plot.top);
        return { x, y };
      });

      const gridLines = 4;
      const gridMarkup = Array.from({ length: gridLines }, (_, i) => {
        const y = plot.top + ((plot.bottom - plot.top) / (gridLines - 1)) * i;
        return `<line x1="${plot.left}" y1="${y}" x2="${plot.right}" y2="${y}"></line>`;
      }).join('');
      document.getElementById('gridGroup').innerHTML = gridMarkup;

      const pointsText = chartPoints.map(p => `${p.x},${p.y}`).join(' ');
      document.getElementById('line').setAttribute('points', pointsText);
      document.getElementById('area').setAttribute('d', `M${plot.left},${plot.bottom} L${pointsText} L${plot.right},${plot.bottom} Z`);
    }

    function updateUI() {
      const current = rows[selectedIndex];
      const point = chartPoints[selectedIndex];
      if (!current || !point) return;

      const isPositive = current.profit >= 0;

      document.getElementById('accountValue').innerHTML = formatFeaturedAccountValue(current.value);
      document.getElementById('profit').textContent = `${isPositive ? '↗' : '↘'} ${euro(current.profit)}`;
      document.getElementById('profit').className = `stat-value ${isPositive ? 'positive' : 'negative'}`;
      document.getElementById('returnRate').textContent = `${isPositive ? '↗' : '↘'} ${current.roi.toFixed(2)}%`;
      document.getElementById('returnRate').className = `stat-value ${isPositive ? 'positive' : 'negative'}`;
      document.getElementById('netDeposits').textContent = `${euro(current.invested)} Net deposits`;

      document.getElementById('chartDate').textContent = dateLabel(current.date);
      document.getElementById('chartMiniValue').textContent = euro(current.value);

      document.getElementById('markerLine').setAttribute('x1', point.x);
      document.getElementById('markerLine').setAttribute('x2', point.x);
      document.getElementById('markerLine').setAttribute('y1', 20);
      document.getElementById('markerLine').setAttribute('y2', 176);
      document.getElementById('markerDot').setAttribute('cx', point.x);
      document.getElementById('markerDot').setAttribute('cy', point.y);

      [...tbody.querySelectorAll('tr')].forEach((tr, i) => {
        tr.classList.toggle('active-row', i === selectedIndex);
      });
      document.querySelectorAll('.portfolio-card').forEach((card, i) => {
        card.classList.toggle('active-row', i === selectedIndex);
      });
    }

    function renderTable() {
      tbody.innerHTML = rows.map((r, i) => `
        <tr data-index="${i}">
          <td style='width:32px;text-align:center;color:#8b96a6;font-size:15px;'>▾</td><td>${dateLabel(r.date)}</td>
          <td>${euro(r.invested)}</td>
          <td>${euro(r.value)}</td>
          <td class="${r.monthlyReturn >= 0 ? 'positive' : 'negative'}">${(r.monthlyReturn * 100).toFixed(2)}%</td>
          <td class="${r.profit >= 0 ? 'positive' : 'negative'}">${euro(r.profit)}</td>
          <td class="${r.roi >= 0 ? 'positive' : 'negative'}">${r.roi.toFixed(2)}%</td>
        </tr>
      `).join('');

      tbody.querySelectorAll('tr').forEach(tr => {
        tr.addEventListener('click', () => {
          selectedIndex = Number(tr.dataset.index);
          updateUI();
        });
      });

      const cards = document.getElementById('portfolioCards');
      cards.innerHTML = rows.map((r, i) => `
        <article class="portfolio-card ${i === selectedIndex ? 'active-row' : ''}" data-index="${i}">
          <div class="portfolio-card-top">
            <div class="portfolio-card-date">⌄ ${dateLabel(r.date)}</div>
            <div class="portfolio-card-value">${euro(r.value)}</div>
          </div>
          <div class="portfolio-card-grid">
            <div><span class="k">Monthly</span><span class="v ${r.monthlyReturn >= 0 ? 'positive' : 'negative'}">${(r.monthlyReturn * 100).toFixed(2)}%</span></div>
            <div><span class="k">Profit</span><span class="v ${r.profit >= 0 ? 'positive' : 'negative'}">${euro(r.profit)}</span></div>
            <div><span class="k">ROI</span><span class="v ${r.roi >= 0 ? 'positive' : 'negative'}">${r.roi.toFixed(2)}%</span></div>
          </div>
        </article>
      `).join('');

      cards.querySelectorAll('.portfolio-card').forEach(card => {
        card.addEventListener('click', () => {
          selectedIndex = Number(card.dataset.index);
          updateUI();
          renderTable();
        });
      });
    }

    function selectByPointer(clientX) {
      const rect = chartSvg.getBoundingClientRect();
      const svgX = ((clientX - rect.left) / rect.width) * 360;
      const plotLeft = 4;
      const plotRight = 348;
      const clamped = Math.max(plotLeft, Math.min(svgX, plotRight));
      const ratio = (clamped - plotLeft) / (plotRight - plotLeft || 1);
      selectedIndex = Math.round(ratio * (rows.length - 1));
      selectedIndex = Math.max(0, Math.min(selectedIndex, rows.length - 1));
      updateUI();
    }

    chartCard.addEventListener('pointerdown', e => {
      chartCard.setPointerCapture(e.pointerId);
      selectByPointer(e.clientX);
    });

    chartCard.addEventListener('pointermove', e => {
      if (e.buttons === 1 || e.pointerType === 'touch') {
        selectByPointer(e.clientX);
      }
    });

    function render() {
      rows = calculateSeries();
      selectedIndex = Math.min(selectedIndex, rows.length - 1);
      drawChart();
      renderTable();
      updateUI();
    }

    [startAmount, annualReturn, monthlyDeposit, years, volatilityInput].forEach(el => {
      el.addEventListener('input', () => {
        volatilityValue.textContent = `${volatilityInput.value}%`;
        render();
      });
    });

    volatilityValue.textContent = `${volatilityInput.value}%`;
    render();
  

    const toast = document.getElementById('toast');
    function showToast(message){
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => toast.classList.remove('show'), 1700);
    }
    document.getElementById('depositBtn').addEventListener('click', () => showToast('Deposit opened'));


    document.getElementById('accountPlusBtn').addEventListener('click', () => showToast('Add funds opened'));
    document.getElementById('notificationBtn').addEventListener('click', () => showToast('No new notifications'));
    document.getElementById('settingsBtn').addEventListener('click', () => showToast('Settings opened'));

document.addEventListener('DOMContentLoaded',()=>{
  const sel=document.getElementById('accountSelect');
  if(sel){
    sel.addEventListener('change',()=>{
      const idx=sel.selectedIndex;
      const accounts=['20876414','14590382','78241659','39187520'];
      sel.options[0].text='Account: '+accounts[idx];
    });
  }
});

</script>
</body>
